version: '3'

vars:
  VERSION:
    sh: git describe --tags --abbrev=0 | sed 's/^v//'
  COMMIT:
    sh: git rev-parse --short HEAD
  DB_PATH: ./vhs_test.db
  SYSLOG_PORT: 8514
  NETFLOW_PORT: 2055
  TRAP_PORT: 8162

tasks:
  default:
    cmds:
      - task: mac_amd64
      - task: mac_arm64
      - task: windows
      - task: linux_amd64
      - task: linux_arm64
      - task: zip
  mac_amd64:
    cmds:
      - task: mkdir
      - GOOS=darwin GOARCH=amd64 go build -o dist/twlogeye.darwin_amd64 -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}}" .
  mac_arm64:
    cmds:
      - task: mkdir
      - GOOS=darwin GOARCH=arm64 go build -o dist/twlogeye.darwin_arm64 -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}}" .
  windows:
    cmds:
      - task: mkdir
      - GOOS=windows GOARCH=amd64 go build -o dist/twlogeye.exe -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}}" .
  linux_amd64:
    cmds:
      - task: mkdir
      - GOOS=linux GOARCH=amd64 go build -o dist/twlogeye.linux_amd64 -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}}" .
  linux_arm64:
    cmds:
      - task: mkdir
      - GOOS=linux GOARCH=arm64 go build -o dist/twlogeye.linux_arm64 -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}}" .
  api:
    cmds:
      - (cd api;protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative twlogeye.proto)
  zip:
    cmds:
      - (cd dist;zip twlogeye.darwin.zip twlogeye.darwin*)
      - (cd dist;zip twlogeye.windows.zip twlogeye.exe)
      - (cd dist;zip twlogeye.linux.zip twlogeye.linux*) 
  mkdir:
    - mkdir -p dist
  clean:
    cmds:
      - rm -rf dist/*
  docker:
    cmds:
      - docker build -t twsnmp/twlogeye  --build-arg VERSION={{.VERSION}} --build-arg COMMIT={{.COMMIT}} .
  docker_push:
    cmds:
      - docker buildx build --platform linux/amd64 --build-arg VERSION={{.VERSION}} --build-arg COMMIT={{.COMMIT}} -t twsnmp/twlogeye:v{{.VERSION}} --push  .
      - docker tag twsnmp/twlogeye:v{{.VERSION}}  twsnmp/twlogeye:latest
      - docker push twsnmp/twlogeye:latest
      - docker buildx build --platform linux/arm64/v8 --build-arg VERSION={{.VERSION}} --build-arg COMMIT={{.COMMIT}} -t twsnmp/twlogeye:arm64_v{{.VERSION}} --push .
      - docker buildx build --platform linux/arm/v7  --build-arg VERSION={{.VERSION}} --build-arg COMMIT={{.COMMIT}} -t twsnmp/twlogeye:arm7_v{{.VERSION}} --push .
  cmd_map:
    cmds:
      - npx markmap-cli cli-map.md -o cli-map-v.html   
  test:
    desc: Run unit tests
    cmds:
      - go test -v ./...
  cover:
    desc: Run unit tests with coverage
    cmds:
      - go test -cover ./...

  start_server:
    desc: Start twlogeye server for recording
    cmds:
      - go build -o dist/twlogeye .
      - ./dist/twlogeye start --dbPath {{.DB_PATH}} --syslogUDPPort {{.SYSLOG_PORT}} --netflowPort {{.NETFLOW_PORT}} --trapPort {{.TRAP_PORT}} --sigmaRules embed:test/syslog
 

  record:
    desc: Record CLI demonstrations using VHS (Server must be started with 'task start_server')
    cmds:
      - go build -o dist/twlogeye .
      - mkdir -p images
      - PATH=$PATH:$(pwd)/dist vhs vhs/basic.tape
      - PATH=$PATH:$(pwd)/dist vhs vhs/dashboard.tape
      - PATH=$PATH:$(pwd)/dist vhs vhs/report-log.tape
